<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>

    <meta name="description"
      content="Contact White Water Rafting to book trips, ask questions, or send feedback. We are here to help you plan your next adventure.">
    <meta name="author" content="Tracy Bulyaba">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.jpeg" alt="Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>

        </nav>
    </header>

    <!-- COMPANY INFO -->

    <main>
        <section class="company-info">
            <h1>Tracie Rafting Company</h1>
            <p>123 Main River Street<br>
                Kolob, California<br>
                +1 999 999 9999<br>
                info@whitewater.com</p>


            <div class="main-content">

                <!-- MAP -->
                <div class="map">
                    <iframe
                      src="https://www.google.com/maps?q=Kolob,California&output=embed"></iframe>
                </div>

                <!-- FORM -->
                <form>

                    <label>Name</label>
                    <input type="text" placeholder="Placeholder">

                    <label>Email</label>
                    <input type="email" placeholder="Placeholder">

                    <!-- RADIO BUTTONS -->
                    <p>Message Purpose</p>

                    <label for="general">
                        <input type="radio" id="general" name="purpose" value="general">
                        General Inquiry
                    </label>

                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label for="suggestion">
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <!-- TEXTAREA -->
                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>

                    <!-- CHECKBOX -->
                    <label for="subscribe">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <!-- BUTTON -->
                    <button type="submit">Get in Touch!</button>

                </form>

            </div>
        </section>

    </main>

    <!-- EMPLOYEES -->
    <section class="employees">
        <h2>We Are Here to Serve You</h2>

        <div class="employee-list">
            <div>
                <img src="images/employee1.jpg" alt="Employee" width="80">
                <p>Nangi</p>
            </div>

            <div>
                <img src="images/employee2.webp" alt="Employee" width="80">
                <p>Baker</p>
            </div>

            <div>
                <img src="images/employee3.webp" alt="Employee" width="80">
                <p>Warner</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 White Water Rafting | Tracy Bulyaba</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>

    </footer>

</body>

</html>
