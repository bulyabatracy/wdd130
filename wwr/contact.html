<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>

    <meta name="description"
      content="Contact White Water Rafting to book trips, ask questions, or send feedback. We are here to help you plan your next adventure.">
    <meta name="author" content="Tracy Bulyaba">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <img src="images/logo.jpeg" alt="Rafting Logo">

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFO (CENTERED) -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p><strong>123 Main River Street</strong></p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-layout">

            <!-- LEFT: MAP -->
            <div class="map-box">
                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed"></iframe>
            </div>

            <!-- RIGHT: FORM -->
            <form class="form-box">

                <label>Name</label>
                <input type="text" placeholder="Placeholder">

                <label>Email</label>
                <input type="email" placeholder="Placeholder">

                <p>Message Purpose</p>

                <label><input type="radio" name="purpose"> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>

                <label>Message</label>
                <textarea placeholder="Type here"></textarea>

                <label class="checkbox">
                    <input type="checkbox">
                    Please Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-cards">

                <figure>
                    <img src="images/photo.webp" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/photo2.webp" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/photo3.webp" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Footer Content including Social Media Icons/Links</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt=""></a>
            <a href="#"><img src="images/twitter.png" alt=""></a>
            <a href="#"><img src="images/instagram.png" alt=""></a>
        </nav>
    </footer>

</body>

</html>
